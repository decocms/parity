name: Release Please

# Watches `main` for Conventional Commits and keeps an open "release PR"
# that bumps `package.json` + writes `CHANGELOG.md` entries. Merging that
# release PR creates a `vX.Y.Z` tag + GitHub release and triggers the
# `publish` job below, which publishes to npm via OIDC.
#
# What you do as a maintainer:
#   1. Write commits with conventional prefixes (`feat:`, `fix:`, …) — the
#      squash-merge default of GitHub copies the PR title into the merge
#      commit, so a PR titled `feat(css-trace): inspect CSS rules` already
#      lands as a minor bump.
#   2. Eventually merge the release PR this workflow keeps fresh — that's
#      the only manual step.
#
# Bump rules (with `bump-minor-pre-major: true` while we're in 0.x):
#   feat:                            → minor
#   fix:                             → patch
#   refactor:                        → patch
#   perf:                            → patch
#   docs:                            → no bump (still listed in CHANGELOG)
#   chore/test/ci/build:             → no bump, hidden from CHANGELOG
#   `BREAKING CHANGE:` footer or `!` → still minor (0.x never auto-bumps to 1.0)
#
# When you decide to graduate to 1.0.0, edit `.release-please-manifest.json`
# to `"1.0.0"`. From then on `BREAKING CHANGE:` / `!` will bump major.
#
# IMPORTANT: the publish step runs INSIDE this workflow rather than in a
# separate tag-triggered workflow because GitHub's default `GITHUB_TOKEN`
# does not cascade-trigger other workflows. If we relied on a separate
# `release.yml` to react to the tag release-please pushes, that workflow
# would never run and npm would never see the release. Keeping publish
# in-line removes that footgun and removes the need for a PAT.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --access public --provenance
