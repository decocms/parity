name: Publish

# Triggers when a commit on `main` changes `package.json` version.
#
# Maintainer flow:
#   1. Make changes, bump version manually:
#        npm version patch    # or minor / major
#      (this updates package.json AND creates a local commit)
#   2. Push to main (or open a PR; bump can also be reviewed before merge).
#   3. On push, this workflow compares `package.json` version vs the
#      currently published npm version. If they differ, it publishes to
#      npm with provenance and creates a `vX.Y.Z` GitHub release with
#      auto-generated notes (commit log since the previous tag).
#
# Why this shape (vs release-please):
#   - GitHub's default `GITHUB_TOKEN` cannot create or approve pull
#     requests on most orgs (org-level setting). release-please needs
#     that permission for its "release PR" pattern and silently fails
#     when the setting is off.
#   - The version-in-package.json model avoids PR creation entirely:
#     the bump IS the human-reviewed change, and the workflow only
#     publishes + tags. Default `GITHUB_TOKEN` already has `contents:
#     write` (for tags/releases) and we use OIDC trusted publishing
#     for npm — no extra secrets, no PAT, no token rotation.
#
# OIDC trusted publishing prerequisites (one-time setup, already done):
#   1. Trusted Publisher rule on npmjs.com → @decocms/parity → Access:
#        Organization or user: decocms
#        Repository:           parity
#        Workflow filename:    publish.yml
#        Environment name:     (blank)
#        Allowed actions:      npm publish
#   2. Workflow has `permissions: { id-token: write }` on the job (NOT
#      workflow level — that wider scope can interact badly with the
#      transition-from-token-auth case).
#   3. npm CLI version on the runner must support the OIDC token-
#      exchange code path (npm 11.x+). Node 22 ships npm 10.9.8 which
#      DOES NOT — see the "Upgrade npm" step below.
#
# Manual break-glass:
#   - `npm publish` from a maintainer machine with `npm login` if the
#     workflow is wedged. The OIDC trusted publisher only fires from
#     GitHub Actions; local publishes use the maintainer's npm account
#     (this is how 0.1.0 through 0.4.0 were published).

on:
  push:
    branches: [main]
    paths:
      - "package.json"
  workflow_dispatch:

# Workflow-level permissions intentionally MINIMAL. The publish job
# below declares the exact permissions it needs (`contents: write` for
# the GitHub release / tag, `id-token: write` for the npm OIDC token).
# Keeping `id-token` declared at the job level (not workflow level) is
# what every other decocms package that successfully publishes via
# OIDC does (e.g. `decocms/deco-start/.github/workflows/release.yml`),
# and it scopes the OIDC token's lifetime + visibility exactly to the
# step that consumes it — npm's trusted-publisher matcher has been
# observed to be sensitive to that scoping in transition cases.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # `workflow_dispatch` exposes a branch picker in the GitHub UI, so
    # without this guard a maintainer could accidentally run the
    # workflow against a feature branch and publish whatever `package.json`
    # version lives there. The `paths` filter only constrains `push`
    # triggers — explicit ref check is needed for dispatch.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write   # for creating tags + releases
      id-token: write   # for npm OIDC / provenance
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so `gh release create --generate-notes` can
          # include the commits since the previous tag.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          # Match `decocms/deco-start/.github/workflows/release.yml` (Node
          # 22), the sibling decocms package that publishes successfully
          # via OIDC. Node 20 ships an older npm; aligning Node version
          # eliminates one variable when diagnosing OIDC handshake failures.
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Check if package.json version is already published
        id: check
        shell: bash
        run: |
          set -euo pipefail
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package: $PKG_NAME"
          echo "local version: $PKG_VERSION"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$PKG_VERSION" >> "$GITHUB_OUTPUT"

          # Probe the EXACT version, not the `latest` dist-tag — comparing
          # against `latest` breaks intentional reverts to an older version
          # that's already published (would trigger a 403 from npm on
          # republish). `npm view PKG@VER version` succeeds (prints VER)
          # when the version exists, fails with E404 when not, and fails
          # with other codes for network / auth / registry-5xx errors.
          # Conflate "doesn't exist" with success; loud-fail everything
          # else so a transient registry hiccup doesn't suppress a real
          # error and trigger an accidental publish.
          set +e
          PROBE_OUT=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>&1)
          PROBE_RC=$?
          set -e

          if [ "$PROBE_RC" -eq 0 ] && [ "$PROBE_OUT" = "$PKG_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  $PKG_NAME@$PKG_VERSION already published, nothing to do"
            exit 0
          fi

          # Treat "package never published" or "version not found" (both
          # surface as E404 from npm view) as "publishable". Any other
          # failure is real and must abort the run.
          if echo "$PROBE_OUT" | grep -qE "E404|code 404|404 Not Found"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ $PKG_NAME@$PKG_VERSION not on registry, will publish"
            exit 0
          fi

          echo "::error::Unexpected response from \`npm view\` (rc=$PROBE_RC):"
          echo "$PROBE_OUT"
          exit 1

      # Node 22 ships npm 10.9.8 which does NOT have the trusted-publishing
      # OIDC token-exchange code path (added in a newer npm minor — the
      # silly-level log of the failed run shows zero requests to
      # `/-/npm/v1/oidc/token-exchange`, npm goes straight to the publish
      # PUT with empty auth, which the registry rejects as a disguised 401
      # → 404). Force the latest stable npm so we get the OIDC client.
      - name: Upgrade npm to a version that supports OIDC trusted publishing
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "npm version before upgrade: $(npm --version)"
          npm install -g npm@latest
          echo "npm version after upgrade:  $(npm --version)"

      - name: Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.check.outputs.changed == 'true'
        run: bun run build

      - name: Publish to npm
        if: steps.check.outputs.changed == 'true'
        # Per https://docs.npmjs.com/trusted-publishers: when trusted
        # publishing is correctly configured, `--access` and `--provenance`
        # flags are NOT needed — `publishConfig.access` in package.json
        # sets the access level, and provenance attestations are auto-
        # generated by npm for OIDC publishes from public repos.
        run: npm publish

      - name: Create GitHub release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --generate-notes asks GitHub to auto-build release notes
          # from PR titles since the previous tag, which is what we
          # want for our Conventional-Commits squash-merge workflow.
          gh release create "${{ steps.check.outputs.tag }}" \
            --title "${{ steps.check.outputs.tag }}" \
            --generate-notes
